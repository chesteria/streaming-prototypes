<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <meta name="app-version" content="1.5.0" />
  <meta name="app-build" content="1" />
  <title>Streaming Prototype</title>

  <!-- Roboto typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- CSS: Design tokens first, then global, then screens -->
  <link rel="stylesheet" href="css/debug-panel.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/lander.css" />
  <link rel="stylesheet" href="css/series-pdp.css" />
  <link rel="stylesheet" href="css/player.css" />
  <link rel="stylesheet" href="css/epg.css" />
  <link rel="stylesheet" href="css/feedback.css" />
  <link rel="stylesheet" href="css/welcome-screen.css" />
</head>
<body>

  <!-- App Root -->
  <div id="app"></div>

  <!-- Toast Notification -->
  <div id="toast"></div>

  <!-- Version / Build Stamp — content set dynamically by app.js -->
  <div id="build-stamp"></div>

  <!-- Utilities (no dependencies) -->
  <script src="js/utils/keycodes.js"></script>
  <script src="js/utils/animations.js"></script>

  <!-- Core Systems -->
  <script src="js/data-store.js"></script>
  <script src="js/debug-panel.js"></script>
  <script src="js/focus-engine.js"></script>

  <!-- Phase 2: Analytics (must load before screens) -->
  <script src="js/analytics.js"></script>

  <!-- QRCode.js — for QR export in debug panel -->
  <script defer src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <!-- HLS.js — required for HLS (.m3u8) playback on Chromium (Vizio, Chrome, Firefox) -->
  <script defer src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>

  <!-- Screens -->
  <script src="js/screens/lander.js"></script>
  <script src="js/screens/series-pdp.js"></script>
  <script src="js/screens/player.js"></script>

  <!-- EPG Screen -->
  <script src="js/screens/epg/data-model.js"></script>
  <script src="js/screens/epg/components/program-tile.js"></script>
  <script src="js/screens/epg/components/channel-logo.js"></script>
  <script src="js/screens/epg/components/channel-row.js"></script>
  <script src="js/screens/epg/components/genre-group.js"></script>
  <script src="js/screens/epg/components/channel-grid.js"></script>
  <script src="js/screens/epg/components/genre-rail.js"></script>
  <script src="js/screens/epg/components/more-info-overlay.js"></script>
  <script src="js/screens/epg/epg-screen.js"></script>

  <!-- Phase 2: Feedback overlay (loads after screens so FocusEngine exists) -->
  <script src="js/feedback.js"></script>

  <!-- Welcome screen (loads after FocusEngine and DebugConfig exist) -->
  <script src="js/welcome-screen.js"></script>

  <!-- App Router (boots on DOMContentLoaded) -->
  <script src="js/app.js"></script>

  <div id="debug-grid-overlay"></div>

</body>
</html>

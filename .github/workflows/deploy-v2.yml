name: Deploy V2 to GitHub Pages

on:
  push:
    branches:
      - feature/phase3-pilot
    paths:
      - 'streaming-prototype-v2/**'
      - '.github/workflows/deploy-v2.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-v2:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: streaming-prototype-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: streaming-prototype-v2/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stage Pages Artifact
        working-directory: .
        run: |
          rm -rf preview-site
          mkdir -p preview-site/v2
          cp -R streaming-prototype-v2/dist/. preview-site/v2/
          cat > preview-site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=/UTA/v2/" />
              <title>UTA Phase 3 Preview</title>
            </head>
            <body>
              <p>Redirecting to <a href="/UTA/v2/">/UTA/v2/</a>...</p>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

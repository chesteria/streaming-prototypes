<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTA Phase 3 P0 Spike</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0f1923;
        color: #ffffff;
        font-family: Arial, sans-serif;
      }

      #app {
        min-height: 100vh;
      }

      .boot-panel {
        box-sizing: border-box;
        min-height: 100vh;
        padding: 48px;
      }

      .boot-panel h1 {
        margin: 0 0 16px;
        font-size: 36px;
      }

      .boot-panel p,
      .boot-panel li,
      .boot-panel pre {
        font-size: 22px;
        line-height: 1.4;
      }

      .boot-panel pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: rgba(255, 255, 255, 0.08);
        padding: 16px;
        border-radius: 12px;
      }
    </style>
    <script type="module" crossorigin src="/UTA/v2/assets/index-DIthQ7Gu.js"></script>
    <link rel="stylesheet" crossorigin href="/UTA/v2/assets/index-DWHNe38Y.css">
  </head>
  <body class="bg-[#121212] text-white font-roboto">
    <div id="app">
      <div class="boot-panel">
        <h1>Phase 3 Preview Loading</h1>
        <p>
          If this message never changes, the device runtime is not executing the
          preview scripts.
        </p>
      </div>
    </div>
    <div
      id="key-debug-overlay"
      style="
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 16px;
        z-index: 9999;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.85);
        color: #00ff9d;
        font: 18px/1.4 monospace;
        border: 2px solid #00ff9d;
      "
    >
      <div id="key-debug-current">waiting for key events...</div>
      <div
        id="key-debug-log"
        style="
          margin-top: 8px;
          max-height: 220px;
          overflow: hidden;
          color: #ffffff;
          font-size: 15px;
          line-height: 1.3;
        "
      ></div>
    </div>
    <script src="./boot.js"></script>
    <script nomodule>
      (function () {
        var app = document.getElementById("app");
        if (!app) return;
        app.innerHTML =
          '<div class="boot-panel">' +
          "<h1>Phase 3 Preview Failed</h1>" +
          "<p>This device runtime does not support JavaScript modules.</p>" +
          "</div>";
      })();
    </script>
  </body>
</html>
